# Cloudflare Flexible SSL — origin 只聽 HTTP :80
# 安裝：sudo cp deploy/apache/testmatch.picklevibes.hk.conf /etc/apache2/sites-available/
#       sudo a2ensite testmatch.picklevibes.hk.conf

<VirtualHost *:80>
    ServerName testmatch.picklevibes.hk
    ServerAdmin admin@picklevibes.hk

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    RemoteIPHeader CF-Connecting-IP
    RemoteIPTrustedProxy 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 \
        141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 \
        197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 \
        104.24.0.0/14 172.64.0.0/13 131.0.72.0/22

    ErrorLog ${APACHE_LOG_DIR}/testmatch-error.log
    CustomLog ${APACHE_LOG_DIR}/testmatch-access.log combined

    ProxyPreserveHost On

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /socket.io/(.*) ws://127.0.0.1:5239/socket.io/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /socket.io/(.*) http://127.0.0.1:5239/socket.io/$1 [P,L]

    ProxyPass        /socket.io/ ws://127.0.0.1:5239/socket.io/
    ProxyPassReverse /socket.io/ ws://127.0.0.1:5239/socket.io/

    ProxyPass        / http://127.0.0.1:5239/
    ProxyPassReverse / http://127.0.0.1:5239/
</VirtualHost>
